{% extends 'base.html' %}

{% block title %}Register Staff - ExpiryAlert{% endblock %}

{% block content %}
<!-- Skeleton Container -->
<div class="skeleton-wrapper" aria-busy="true" aria-live="polite">
    <div class="auth-container">
        <div class="auth-logo">
            <div class="skeleton-title skeleton-shimmer" style="width: 150px; margin: 0 auto; height: 30px;"></div>
        </div>
        <div class="skeleton-card" style="height: 450px; display: flex; flex-direction: column; gap: 1.2rem;">
            <div>
                <div class="skeleton-text skeleton-shimmer" style="width: 30%; height: 16px; margin-bottom: 6px;"></div>
                <div class="skeleton-text skeleton-shimmer" style="height: 38px; width: 100%; border-radius: var(--radius-sm); margin-bottom: 0;"></div>
            </div>
            <div>
                <div class="skeleton-text skeleton-shimmer" style="width: 30%; height: 16px; margin-bottom: 6px;"></div>
                <div class="skeleton-text skeleton-shimmer" style="height: 38px; width: 100%; border-radius: var(--radius-sm); margin-bottom: 0;"></div>
            </div>
            <div>
                <div class="skeleton-text skeleton-shimmer" style="width: 30%; height: 16px; margin-bottom: 6px;"></div>
                <div class="skeleton-text skeleton-shimmer" style="height: 38px; width: 100%; border-radius: var(--radius-sm); margin-bottom: 0;"></div>
            </div>
            <div class="skeleton-button skeleton-shimmer" style="height: 42px; width: 100%; border-radius: var(--radius-sm); margin-top: auto;"></div>
        </div>
    </div>
</div>

<!-- Actual Content Container -->
<div class="content-wrapper">
    <div class="auth-container" style="max-width: 500px;">
        <div class="auth-logo">
            <i class="fa-solid fa-user-shield"></i> Register Store Staff
        </div>
        
        <div class="card">
            <form method="POST" action="{{ url_for('register_staff') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="name">Staff Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Jane Staff" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="staff@store.com" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="e.g. 9876543210" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Choose password for staff" required autocomplete="new-password">
                </div>

                {% if session['user_role'] == 'super_admin' %}
                <div class="form-group" style="margin-bottom: 1.75rem;">
                    <label for="store_id">Assign to Store Location</label>
                    <select id="store_id" name="store_id" class="form-control" required>
                        <option value="" disabled selected>Select a Store</option>
                        {% for store in stores %}
                            <option value="{{ store.id }}">{{ store.name }} (ID: {{ store.id }})</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
                
                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">
                    <i class="fa-solid fa-user-plus"></i> Register Staff Member
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
